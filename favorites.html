<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO + | Избранное</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <button class="menu-toggle" onclick="toggleMenu()">
                    <img src="img/icons/list.png" alt="Меню" class="nav-icon">
                </button>
                
                <div id="dropdownMenu" class="simple-dropdown">
                    <ul class="dropdown-list">
                        <li><a href="index.html" onclick="toggleMenu()">На главную</a></li>
                        <li><a href="about.html" onclick="toggleMenu()">О нас</a></li>
                        <li><a href="adress.html" onclick="toggleMenu()">Адрес</a></li>
                        <li><a href="catalog.html" onclick="toggleMenu()">Каталог товаров</a></li>
                    </ul>
                </div>

                <a href="index.html" class="logo-link">
                    <img src="img/logo.png" alt="LEGO+" class="logo-image">
                </a>
            </div>
            <nav class="user-nav">
    <a href="favorites.html" class="fav-icon-wrapper">
        <img src="img/icons/heart.png" alt="Избранное" class="nav-icon">
        <span class="fav-count">0</span>
    </a>
    
   <a href="faq.html"><img src="img/icons/speech.png" alt="FAQ" class="nav-icon"></a>
    
    <a href="cart.html" class="cart-icon-wrapper">
        <img src="img/icons/cart.png" alt="Корзина" class="nav-icon">
        <span class="cart-count">0</span>
    </a>
</nav>
    </header>

    <main>
        <section class="favorites-page">
            <div class="container">
                <h1>Избранное</h1>
                
                <div id="favoritesContent">
                    <!-- Товары будут загружены здесь -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-top">
                <div class="footer-logo-section">
                    <img src="img/logo.png" alt="LEGO+" class="footer-logo">
                    <p>Официальный магазин конструкторов LEGO</p>
                    <div class="social-icons">
                        <a href="#" class="social-link"><img src="img/icons/vk.png" class="social-icon" alt="VK"></a>
                        <a href="#" class="social-link"><img src="img/icons/max.png" class="social-icon" alt="Max"></a>
                    </div>
                </div>

                <div class="footer-links-section">
                    <h4>Покупателям</h4>
                    <ul>
                        <li><a href="about.html">О нас</a></li>
                        <li><a href="#" onclick="openFeedbackModal(event)">Обратная связь</a></li>
                    </ul>
                </div>

                <div class="footer-contact-section">
                    <h4>Контакты</h4>
                    <p>г. Санкт-Петербург, пр. Энгельса, д. 129, к. 4</p>
                    <p>+7 (911) 137-40-16</p>
                    <p>support@legoplus.ru</p>
                </div>
            </div> 

            <div class="footer-bottom">
                <p>2026 LEGO +</p>
            </div>
        </div>
    </footer>

    <div id="feedbackModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeFeedbackModal()">&times;</span>
            <h2>Обратная связь</h2>
            <form class="feedback-form" onsubmit="submitFeedback(event)">
                <div class="form-group">
                    <label>Ваше имя:</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label>Сообщение:</label>
                    <textarea rows="4" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Отправить</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderFavoritesPage();
            updateCounters();
        });
    </script>
</body>
</html>
